<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minik Dergi - Minik Kalemler</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/game.css">
  <link rel="stylesheet" href="css/modules.css">
  <style>
    .magazine-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
      margin-top: 20px;
    }

    .magazine-viewer {
      width: 100%;
      max-width: 800px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
      border: 4px solid #fff;
    }

    .magazine-image {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.3s ease;
    }

    .magazine-image:hover {
      transform: scale(1.02);
    }

    .magazine-controls {
      display: flex;
      gap: 15px;
    }

    .btn-action {
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      background: var(--primary-color, #4FC3F7);
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-action:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      opacity: 0.9;
    }
  </style>
</head>

<body class="animated-bg">
  <div class="floating-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <main class="container game-page">
    <div class="game-topbar">
      <a href="index.html" class="btn-back"><span class="arrow">←</span> Ana Sayfa</a>
      <h1 class="game-title">📚 Minik Dergi</h1>
    </div>

    <div class="magazine-container">
      <div class="magazine-viewer">
        <img src="assets/dergi.jpg" alt="Minik Dergi" class="magazine-image">
      </div>
      
      <div class="magazine-info" style="text-align: center;">
        <h2>Keyifli Okumalar!</h2>
        <p>En yeni sayımızı buradan inceleyebilirsin.</p>
      </div>

      <div class="magazine-controls">
        <a href="assets/dergi.jpg" download class="btn-action">
          <span>📥</span> İndir
        </a>
        <button onclick="window.print()" class="btn-action" style="background: #FF6B9D;">
          <span>🖨️</span> Yazdır
        </button>
      </div>
    </div>
  </main>

  <script>
    // Add some simple interaction if needed
    console.log("Magazine page loaded");
  </script>
</body>

</html>
